{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
  <div class="row">
    <aside class="col-md-3 mb-3">
      <div class="card">
        <div class="card-header">❓ Ayuda</div>
        <div class="card-body p-2">
          {% for categoria, items in menu.items %}
            <div class="mb-2">
              <div class="fw-semibold small text-muted px-2">{{ categoria }}</div>
              <div class="list-group list-group-flush">
                {% for item in items %}
                  <a class="list-group-item list-group-item-action py-2 {% if item.slug == articulo.slug %}active{% endif %}"
                     href="{% url 'ayuda:articulo' item.slug %}">
                    {{ item.titulo }}
                  </a>
                {% endfor %}
              </div>
            </div>
          {% endfor %}
        </div>
      </div>
    </aside>

    <main class="col-md-9">
      {% block ayuda_content %}{% endblock %}
    </main>
  </div>
</div>
{% endblock %}
