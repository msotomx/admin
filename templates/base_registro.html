<!-- TEMPLATE BASE GLOBAL SWITCHH -->
{% load static %}
{% load form_filters %}

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Switchh•Sistemas{%endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="icon" type="image" href="{% static 'img/favicon_sw_64.jpg' %}">

    <!-- Bootstrap 5 desde CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Flatpickr CSS (Fecha MX) -->
    <link rel="stylesheet" href="{% static 'vendor/flatpickr/flatpickr.min.css' %}">

    <link rel="stylesheet" href="{% static 'css/styles.css' %}">

    {% block extra_head %}{% endblock %}
</head>
<body>
    <!-- Contenido principal -->
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Flatpickr JS (Fecha MX) -->
    <script src="{% static 'vendor/flatpickr/flatpickr.min.js' %}"></script>
    <script src="{% static 'vendor/flatpickr/l10n/es.js' %}"></script>

    <!-- Inicializador global Fecha MX -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            if (!window.flatpickr) return;

            flatpickr(".mx-date", {
            dateFormat: "d/m/Y",       // lo que ve el usuario
            allowInput: true,
            locale: "es",

            // ✅ Esto es CLAVE: el valor inicial viene "YYYY-MM-DD"
            altInput: true,
            altFormat: "d/m/Y",        // visible
            dateFormat: "Y-m-d"        // valor real (ISO) para enviar al backend
            });
        });
    </script>


    {% block extra_js %}{% endblock %}
</body>
</html>
